<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/rasa-webchat/lib/index.js"></script>
</head>
<body>
    <h1>Personal Finance Coach Chatbot</h1>

    <script>
        WebChat.default.init({
            selector: "body",
            initPayload: "/greet",
            customData: { language: "en" },
            socketUrl: "http://localhost:5005",
            title: "Finance Bot",
            subtitle: "Track expenses & get investment tips",
        });
    </script>
</body>
</html>
